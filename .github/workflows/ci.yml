name: Backend CI

on:
  pull_request:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: harikamadhugadhiraju/IT-GithubActions/actions/python-ci@v1
        with:
          python-version: '3.11'
          requirements-file: requirements.txt
          lint-enabled: 'true'
          test-enabled: 'true'
